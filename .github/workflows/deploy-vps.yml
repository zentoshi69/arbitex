# Auto-deploy ArbitEx to VPS on every push to main.
#
# Required repo secrets (Settings > Secrets and variables > Actions):
#   VPS_HOST        — 187.124.169.200
#   VPS_USER        — root
#   VPS_SSH_KEY     — private key (full PEM, begins with -----BEGIN)
#   VPS_DEPLOY_PATH — /root/arbitex

name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            cd "$DEPLOY_PATH"

            COMPOSE="docker compose -f docker-compose.prod.yml --env-file .env.prod --env-file .env.secrets"

            echo "=== Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "=== Build Docker images ==="
            $COMPOSE build --no-cache api worker web

            echo "=== Run migrations ==="
            $COMPOSE run --rm -e DATABASE_URL="$DATABASE_URL" api node -e "
              const { execSync } = require('child_process');
              execSync('npx prisma migrate deploy', { stdio: 'inherit', cwd: '/app/packages/db' });
            " || echo "Migration skipped (non-fatal)"

            echo "=== Restart services ==="
            $COMPOSE up -d

            echo "=== Wait for API health ==="
            for i in $(seq 1 30); do
              if $COMPOSE exec -T api node -e "fetch('http://127.0.0.1:3001/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))" 2>/dev/null; then
                echo "API healthy after ${i}0s"
                break
              fi
              echo "Waiting... (${i}0s)"
              sleep 10
            done

            echo "=== Service status ==="
            $COMPOSE ps
            $COMPOSE logs --tail=20 api
            echo "=== Deploy complete ==="
