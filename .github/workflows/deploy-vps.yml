# Optional: deploy from GitHub to your VPS on button-click (or push).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VPS_HOST        — e.g. 187.124.169.200
#   VPS_USER        — e.g. root
#   VPS_SSH_KEY     — private key (full PEM, begins with -----BEGIN)
#   VPS_DEPLOY_PATH — absolute path on server where the repo lives, e.g. /root/arbitex
#
# First time on the VPS: clone the repo to VPS_DEPLOY_PATH once (see docs/VPS-24-7.md).

name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      use_prod:
        description: "Use docker-compose.prod.yml + .env.production"
        required: false
        default: "false"
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_PATH }}"
            chmod +x scripts/vps-quick.sh 2>/dev/null || true
            if [ "${{ inputs.use_prod }}" = "true" ]; then
              ./scripts/vps-quick.sh --pull --prod
            else
              ./scripts/vps-quick.sh --pull
            fi
