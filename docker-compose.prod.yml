# ArbitEx — Production deployment for bitrunnar3001.com
#
# Usage:
#   1. cp .env.prod.example .env.prod && edit .env.prod
#   2. docker compose -f docker-compose.prod.yml --env-file .env.prod --profile tools run --rm migrate
#   3. docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Migrations run as a one-off before first up. Re-run migrate after schema changes.

version: "3.9"

services:
  # ── Reverse proxy (Caddy) — TLS + WebSocket ─────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    networks:
      - arbitex_network

  # ── Infrastructure ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arbitex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-arbitex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arbitex}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - arbitex_network

  migrate:
    build:
      context: .
      dockerfile: infra/Dockerfile.migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - arbitex_network
    profiles:
      - tools

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - arbitex_network

  # ── Applications ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL:-}
      ETHEREUM_ARCHIVE_RPC_URL: ${ETHEREUM_ARCHIVE_RPC_URL:-}
      AVALANCHE_RPC_URL: ${AVALANCHE_RPC_URL:-}
      AVALANCHE_ARCHIVE_RPC_URL: ${AVALANCHE_ARCHIVE_RPC_URL:-}
      AVALANCHE_WSS_URL: ${AVALANCHE_WSS_URL:-}
      ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL:-}
      BASE_RPC_URL: ${BASE_RPC_URL:-}
      CHAIN_ID: ${CHAIN_ID:-43114}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-8h}
      OPERATOR_API_KEY: ${OPERATOR_API_KEY}
      OPERATOR_PASSWORD_HASH: ${OPERATOR_PASSWORD_HASH:-}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-}
      DASHBOARD_ORIGIN: https://bitrunnar3001.com
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arbitex_network

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL:-}
      ETHEREUM_ARCHIVE_RPC_URL: ${ETHEREUM_ARCHIVE_RPC_URL:-}
      AVALANCHE_RPC_URL: ${AVALANCHE_RPC_URL:-}
      AVALANCHE_ARCHIVE_RPC_URL: ${AVALANCHE_ARCHIVE_RPC_URL:-}
      AVALANCHE_WSS_URL: ${AVALANCHE_WSS_URL:-}
      ARBITRUM_RPC_URL: ${ARBITRUM_RPC_URL:-}
      BASE_RPC_URL: ${BASE_RPC_URL:-}
      CHAIN_ID: ${CHAIN_ID:-43114}
      EXECUTION_WALLET_KEYSTORE_PATH: /run/secrets/keystore.json
      EXECUTION_WALLET_KEYSTORE_PASS: ${EXECUTION_WALLET_KEYSTORE_PASS:-}
      FLASHBOTS_AUTH_KEY: ${FLASHBOTS_AUTH_KEY:-}
      MOCK_EXECUTION: ${MOCK_EXECUTION:-true}
      DEFAULT_MAX_TRADE_SIZE_USD: ${DEFAULT_MAX_TRADE_SIZE_USD:-1000}
      DEFAULT_MIN_NET_PROFIT_USD: ${DEFAULT_MIN_NET_PROFIT_USD:-5}
      DEFAULT_MAX_GAS_GWEI: ${DEFAULT_MAX_GAS_GWEI:-100}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - keystore
    networks:
      - arbitex_network

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.bitrunnar3001.com
        NEXT_PUBLIC_WS_URL: wss://api.bitrunnar3001.com
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - api
    networks:
      - arbitex_network

  # ── Observability ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - arbitex_network

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

secrets:
  keystore:
    file: ${KEYSTORE_FILE_PATH:-./infra/dev-keystore.json}

networks:
  arbitex_network:
    name: arbitex_network
