services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arbitex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-arbitex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-lc", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN:?set DASHBOARD_ORIGIN}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL:?set ETHEREUM_RPC_URL}
      ETHEREUM_ARCHIVE_RPC_URL: ${ETHEREUM_ARCHIVE_RPC_URL:-}
      AVALANCHE_RPC_URL: ${AVALANCHE_RPC_URL:-}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      OPERATOR_API_KEY: ${OPERATOR_API_KEY:?set OPERATOR_API_KEY}
      OPERATOR_PASSWORD_HASH: ${OPERATOR_PASSWORD_HASH:-}
      OPERATOR_PASSWORD_HASHES: ${OPERATOR_PASSWORD_HASHES:-}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-}
      MOCK_EXECUTION: ${MOCK_EXECUTION:-false}
      SUPERADMIN_KEYSTORE_PATH: /run/secrets/superadmin_keystore.json
      SUPERADMIN_KEYSTORE_PASS: ${SUPERADMIN_KEYSTORE_PASS:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - superadmin_keystore
    expose:
      - "3001"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL:?set ETHEREUM_RPC_URL}
      ETHEREUM_ARCHIVE_RPC_URL: ${ETHEREUM_ARCHIVE_RPC_URL:-}
      AVALANCHE_RPC_URL: ${AVALANCHE_RPC_URL:-}
      FLASHBOTS_AUTH_KEY: ${FLASHBOTS_AUTH_KEY:-}
      FLASHBOTS_RELAY_URL: ${FLASHBOTS_RELAY_URL:-}
      EXECUTION_WALLET_KEYSTORE_PATH: /run/secrets/execution_keystore.json
      EXECUTION_WALLET_KEYSTORE_PASS: ${EXECUTION_WALLET_KEYSTORE_PASS:-}
      MOCK_EXECUTION: ${MOCK_EXECUTION:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - execution_keystore

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?set NEXT_PUBLIC_WS_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:?set NEXT_PUBLIC_WS_URL}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-}
    depends_on:
      - api
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL}
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN:?set DASHBOARD_DOMAIN}
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

secrets:
  execution_keystore:
    file: ${EXECUTION_KEYSTORE_FILE:?set EXECUTION_KEYSTORE_FILE}
  superadmin_keystore:
    file: ${SUPERADMIN_KEYSTORE_FILE:?set SUPERADMIN_KEYSTORE_FILE}

