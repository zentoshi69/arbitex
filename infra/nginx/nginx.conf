# ArbitEx — Nginx reverse proxy for bitrunnar3001.com
# TLS certs: use certbot (Let's Encrypt). Example:
#   certbot certonly --standalone -d bitrunnar3001.com -d api.bitrunnar3001.com
# Then set ssl_certificate paths below.

# Upstreams (adjust if services run on different host/ports)
upstream arbitex_web {
    server 127.0.0.1:3000;  # or web:3000 if nginx runs in same Docker network
}
upstream arbitex_api {
    server 127.0.0.1:3001;   # or api:3001
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name bitrunnar3001.com api.bitrunnar3001.com;
    return 301 https://$host$request_uri;
}

# Dashboard — bitrunnar3001.com
server {
    listen 443 ssl http2;
    server_name bitrunnar3001.com;

    ssl_certificate     /etc/letsencrypt/live/bitrunnar3001.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bitrunnar3001.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://arbitex_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API + WebSocket — api.bitrunnar3001.com
server {
    listen 443 ssl http2;
    server_name api.bitrunnar3001.com;

    ssl_certificate     /etc/letsencrypt/live/bitrunnar3001.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bitrunnar3001.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://arbitex_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / Socket.IO
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
