version: "3.9"

services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: arbitex
      POSTGRES_PASSWORD: arbitex_dev_password
      POSTGRES_DB: arbitex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbitex"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass arbitex_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "arbitex_redis_dev", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Applications ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://arbitex:arbitex_dev_password@postgres:5432/arbitex
      REDIS_URL: redis://:arbitex_redis_dev@redis:6379
      JWT_SECRET: dev_jwt_secret_replace_in_production_min_256_bits
      OPERATOR_API_KEY: dev_operator_api_key_replace_in_production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
    develop:
      watch:
        - action: sync+restart
          path: ./apps/api/src
          target: /app/apps/api/src

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://arbitex:arbitex_dev_password@postgres:5432/arbitex
      REDIS_URL: redis://:arbitex_redis_dev@redis:6379
      ETHEREUM_RPC_URL: ${ETHEREUM_RPC_URL:-}
      AVALANCHE_RPC_URL: ${AVALANCHE_RPC_URL:-}
      AVALANCHE_WSS_URL: ${AVALANCHE_WSS_URL:-}
      CHAIN_ID: ${CHAIN_ID:-43114}
      EXECUTION_WALLET_KEYSTORE_PATH: /run/secrets/keystore.json
      EXECUTION_WALLET_KEYSTORE_PASS: ${EXECUTION_WALLET_KEYSTORE_PASS:-}
      FLASHBOTS_AUTH_KEY: ${FLASHBOTS_AUTH_KEY:-}
      MOCK_EXECUTION: ${MOCK_EXECUTION:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - keystore

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    depends_on:
      - api

  # ── Observability ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  postgres_data:
  redis_data:

secrets:
  keystore:
    file: ${KEYSTORE_FILE_PATH:-./infra/dev-keystore.json}

networks:
  default:
    name: arbitex_network
