x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "3"

services:
  # ── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arbitex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arbitex_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-arbitex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbitex"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD:-arbitex_redis_dev}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-arbitex_redis_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Applications ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    logging: *default-logging
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-arbitex}:${POSTGRES_PASSWORD:-arbitex_dev_password}@postgres:5432/${POSTGRES_DB:-arbitex}
      REDIS_URL: redis://:${REDIS_PASSWORD:-arbitex_redis_dev}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_replace_in_production_min_256_bits}
      OPERATOR_API_KEY: ${OPERATOR_API_KEY:-dev_operator_api_key_replace_in_production}
      PORT: 3001
      CHAIN_ID: ${CHAIN_ID:-43114}
      DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN:-http://localhost:3000}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-arbitex2026}
      AVALANCHE_RPC_URL: ${AVALANCHE_RPC_URL:-https://avalanche.drpc.org}
      MOCK_EXECUTION: ${MOCK_EXECUTION:-true}
      DEFAULT_MIN_POOL_LIQUIDITY_USD: ${DEFAULT_MIN_POOL_LIQUIDITY_USD:-5000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: always
    logging: *default-logging
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-arbitex}:${POSTGRES_PASSWORD:-arbitex_dev_password}@postgres:5432/${POSTGRES_DB:-arbitex}
      REDIS_URL: redis://:${REDIS_PASSWORD:-arbitex_redis_dev}@redis:6379
      AVALANCHE_RPC_URL: ${AVALANCHE_RPC_URL:-https://avalanche.drpc.org}
      AVALANCHE_WSS_URL: ${AVALANCHE_WSS_URL:-wss://avalanche.drpc.org}
      CHAIN_ID: ${CHAIN_ID:-43114}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_replace_in_production_min_256_bits}
      OPERATOR_API_KEY: ${OPERATOR_API_KEY:-dev_operator_api_key_replace_in_production}
      EXECUTION_WALLET_KEYSTORE_PATH: /run/secrets/keystore.json
      EXECUTION_WALLET_KEYSTORE_PASS: ${EXECUTION_WALLET_KEYSTORE_PASS:-}
      FLASHBOTS_AUTH_KEY: ${FLASHBOTS_AUTH_KEY:-}
      MOCK_EXECUTION: ${MOCK_EXECUTION:-true}
      DEFAULT_MIN_POOL_LIQUIDITY_USD: ${DEFAULT_MIN_POOL_LIQUIDITY_USD:-5000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    secrets:
      - keystore

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    logging: *default-logging
    ports:
      - "3000:3000"
    environment:
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:-arbitex2026}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_replace_in_production_min_256_bits}
      INTERNAL_API_URL: http://api:3001
    depends_on:
      - api

  # ── Reverse Proxy ────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: always
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-admin@bitrunner3001.com}
      DASHBOARD_DOMAIN: ${DASHBOARD_DOMAIN:-bitrunner3001.com}
      API_DOMAIN: ${API_DOMAIN:-api.bitrunner3001.com}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

secrets:
  keystore:
    file: ${KEYSTORE_FILE_PATH:-./infra/dev-keystore.json}

networks:
  default:
    name: arbitex_network
